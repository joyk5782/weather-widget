name: Update weather image

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

concurrency:
  group: pages-image-update
  cancel-in-progress: true
  
permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weather image
        env:
          KMA_SERVICE_KEY: ${{ secrets.KMA_SERVICE_KEY }}
        run: python weather.py

      - name: Commit weather image
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add weather.png
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Update weather image" && git push)
