name: Update date image


on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate date image
        run: python date_widget.py

      - name: Commit date image
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add date.png
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Update date image" && git push)
